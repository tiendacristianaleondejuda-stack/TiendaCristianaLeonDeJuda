<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago no procesado - León de Judá</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      max-width: 480px;
      background: white;
      border-radius: 24px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #fee2e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon i { font-size: 2.5rem; color: #991b1b; }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; color: #1c1917; }
    p { color: #78716c; margin-bottom: 1.5rem; line-height: 1.5; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1c1917;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #2c2520; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <i class="bi bi-x-circle-fill"></i>
    </div>
    <h1>Pago no procesado ❌</h1>
    <p>Cancelaste el pago o hubo un problema. No se realizó ningún cargo. Podés volver a intentarlo.</p>
    <a href="/pages/tienda/carrito.html" class="btn">
      <i class="bi bi-arrow-left"></i> Volver al carrito
    </a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const pedidoId = params.get('id');

    if (pedidoId) {
      // Marcar pedido como cancelado (si no está ya pagado)
      const { data: pedido } = await sb
        .from('pedidos')
        .select('estado')
        .eq('id', pedidoId)
        .single();
      
      // Solo cancelar si no está pagado
      if (pedido && pedido.estado !== 'pagado') {
        await sb.from('pedidos').update({ estado: 'cancelado' }).eq('id', pedidoId);
      }
      
      localStorage.removeItem('mp_pedido_pendiente');
    }
    
    // ✅ RESTAURAR CARRITO DESDE BACKUP (si existe)
    const carritoBackup = localStorage.getItem('carrito_backup');
    if (carritoBackup) {
      localStorage.setItem('carrito', carritoBackup);
      localStorage.removeItem('carrito_backup');
    }
    
    // ✅ Mostrar mensaje opcional en consola
    console.log('Pago cancelado. Carrito restaurado.');
  })();
</script>

</body>
</html>
