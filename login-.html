<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1c1917">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <title>León de Judá — Ingresar</title>
  <style>
    :root {
      --bg:         #f5f0e8;
      --text:       #1c1917;
      --text-muted: #78716c;
      --gold:       #9a7b2e;
      --gold-light: #c9a84c;
      --border:     #ddd5c0;
      --card-bg:    #faf7f2;
      --white:      #ffffff;
      --red:        #b91c1c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(154,123,46,.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .volver {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .8rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: .75rem;
      align-self: flex-start;
      max-width: 440px;
      width: 100%;
      transition: color .2s;
    }
    .volver:hover { color: var(--text); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      position: relative;
      z-index: 1;
    }

    .card-top {
      background: var(--text);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .card-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--gold-light);
      margin-bottom: .2rem;
    }

    .card-sub {
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: .9rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .2s;
    }

    .tab:hover  { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* Panels */
    .panel { display: none; padding: 1.5rem; }
    .panel.active { display: block; }

    /* Form */
    .field { margin-bottom: 1.1rem; }

    .field label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .35rem;
    }

    .field input {
      width: 100%;
      padding: .7rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: .9rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus { border-color: var(--text); background: var(--white); }

    .pass-wrap { position: relative; }

    .pass-wrap input { padding-right: 2.5rem; }

    .toggle-pass {
      position: absolute;
      right: .6rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--text-muted);
      font-size: 1rem; padding: .25rem;
      transition: color .2s;
    }

    .toggle-pass:hover { color: var(--text); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 .75rem; }
    @media (max-width: 360px) { .grid-2 { grid-template-columns: 1fr; } }

    .forgot {
      display: block;
      text-align: right;
      font-size: .78rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: -.5rem;
      margin-bottom: 1.1rem;
    }
    .forgot:hover { color: var(--gold); }

    .btn-submit {
      width: 100%;
      padding: .875rem;
      background: var(--text);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      transition: background .2s, transform .15s;
      margin-top: .25rem;
    }

    .btn-submit:hover    { background: #2c2520; transform: translateY(-1px); }
    .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: wait; transform: none; }

    .alert {
      padding: .7rem .9rem;
      border-radius: 8px;
      font-size: .83rem;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      line-height: 1.4;
    }

    .alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: var(--red); }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
  </style>
</head>
<body>

  <a href="/index.html" class="volver">
    <i class="bi bi-arrow-left"></i> Volver a la tienda
  </a>

  <div class="card">
    <div class="card-top">
      <div class="card-logo">✝ León de Judá</div>
      <p class="card-sub">Ropa Cristiana</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="login">Ingresar</button>
      <button class="tab" data-tab="registro">Crear cuenta</button>
    </div>

    <!-- ═══ PANEL LOGIN ═══ -->
    <div class="panel active" id="panel-login">
      <div class="alert alert-error" id="login-error" style="display:none">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="login-error-msg"></span>
      </div>

      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="login-password">Contraseña</label>
          <div class="pass-wrap">
            <input type="password" id="login-password" placeholder="Tu contraseña" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" onclick="togglePass('login-password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <a href="#" class="forgot" id="forgot-link">¿Olvidaste tu contraseña?</a>

        <button type="submit" class="btn-submit" id="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
    </div>

    <!-- ═══ PANEL REGISTRO ═══ -->
    <div class="panel" id="panel-registro">
      <div class="alert alert-error" id="reg-error" style="display:none">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="reg-error-msg"></span>
      </div>
      <div class="alert alert-success" id="reg-ok" style="display:none">
        <i class="bi bi-check-circle-fill"></i>
        <span>¡Cuenta creada! Revisá tu correo para confirmar.</span>
      </div>

      <form id="form-registro" novalidate autocomplete="on">
        <div class="grid-2">
          <div class="field">
            <label for="reg-nombre">Nombre</label>
            <input type="text" id="reg-nombre" placeholder="Ana" autocomplete="given-name">
          </div>
          <div class="field">
            <label for="reg-apellido">Apellido</label>
            <input type="text" id="reg-apellido" placeholder="García" autocomplete="family-name">
          </div>
        </div>

        <div class="field">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="reg-password">Contraseña</label>
          <div class="pass-wrap">
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
            <button type="button" class="toggle-pass" onclick="togglePass('reg-password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="reg-tel">Teléfono (opcional)</label>
          <input type="tel" id="reg-tel" placeholder="+54 9 11 1234 5678" autocomplete="tel">
        </div>

        <button type="submit" class="btn-submit" id="btn-registro">
          <i class="bi bi-person-plus"></i> Crear mi cuenta
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>

  <script>
    // ── Tabs ──────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // ── Redirigir si ya está logueado ─────────────────────────
    (async () => {
      const user = await getUsuario();
      if (!user) return;
      window.location.href = user.email === ADMIN_EMAIL
        ? '/pages/admin/panel.html'
        : '/index.html';
    })();

    // ── LOGIN ─────────────────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('btn-login');
      const errBox   = document.getElementById('login-error');
      const errMsg   = document.getElementById('login-error-msg');

      errBox.style.display = 'none';

      if (!email || !password) {
        errMsg.textContent = 'Completá todos los campos.';
        errBox.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Ingresando…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errMsg.textContent   = traducirError(error.message);
        errBox.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
        return;
      }

      window.location.href = data.user.email === ADMIN_EMAIL
        ? '/pages/admin/panel.html'
        : (new URLSearchParams(location.search).get('redirect') || '/index.html');
    });

    // ── REGISTRO ──────────────────────────────────────────────
    document.getElementById('form-registro').addEventListener('submit', async e => {
      e.preventDefault();
      const nombre   = document.getElementById('reg-nombre').value.trim();
      const apellido = document.getElementById('reg-apellido').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const tel      = document.getElementById('reg-tel').value.trim();
      const btn      = document.getElementById('btn-registro');
      const errBox   = document.getElementById('reg-error');
      const errMsg   = document.getElementById('reg-error-msg');
      const okBox    = document.getElementById('reg-ok');

      errBox.style.display = 'none';
      okBox.style.display  = 'none';

      if (!email || !password) {
        errMsg.textContent   = 'El correo y la contraseña son obligatorios.';
        errBox.style.display = 'flex';
        return;
      }

      if (password.length < 6) {
        errMsg.textContent   = 'La contraseña debe tener al menos 6 caracteres.';
        errBox.style.display = 'flex';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creando cuenta…';

      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { nombre, apellido, telefono: tel } }
      });

      if (error) {
        errMsg.textContent   = traducirError(error.message);
        errBox.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear mi cuenta';
        return;
      }

      // Supabase requiere confirmación de email
      if (data.user && !data.session) {
        okBox.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear mi cuenta';
        return;
      }

      // Registro sin confirmación (si está desactivada en Supabase)
      if (data.user) {
        await sb.from('perfiles').upsert({
          user_id: data.user.id, nombre, apellido, telefono: tel
        });
        window.location.href = '/index.html';
      }
    });

    // ── Recuperar contraseña ──────────────────────────────────
    document.getElementById('forgot-link').addEventListener('click', async e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      if (!email) {
        alert('Escribí tu correo en el campo de arriba primero.');
        return;
      }
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/pages/tienda/cuenta.html',
      });
      if (error) alert('Error: ' + error.message);
      else alert('Te enviamos un correo para restablecer tu contraseña.');
    });

    // ── Helpers ───────────────────────────────────────────────
    function togglePass(id, btn) {
      const input = document.getElementById(id);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    function traducirError(msg) {
      const map = {
        'Invalid login credentials':        'Correo o contraseña incorrectos.',
        'Email not confirmed':              'Confirmá tu correo antes de ingresar.',
        'User already registered':          'Ya existe una cuenta con ese correo.',
        'Password should be at least 6':    'La contraseña debe tener al menos 6 caracteres.',
        'Unable to validate email address': 'El formato del correo no es válido.',
        'Email rate limit exceeded':        'Demasiados intentos. Esperá unos minutos.',
      };
      for (const [k, v] of Object.entries(map)) {
        if (msg.includes(k)) return v;
      }
      return msg;
    }
  </script>
</body>
</html>
